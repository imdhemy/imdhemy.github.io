# -------------------------------------------------------------------------------------------------
# Jekyll Configuration
# -------------------------------------------------------------------------------------------------
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#

# -------------------------------------------------------------------------------------------------
# Site Settings
# -------------------------------------------------------------------------------------------------
title: Imdhemy
email: your-email@example.com
description: |
  I'm a software engineer and customer data expert focused on turning raw data into meaningful, actionable insights.
  I work across the full customer data lifecycle, from clean data capture to behavior-aware models and decisions.
github:
  build_revision: "1.0.0"
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://imdhemy.com" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username: imdhemy
github_username: imdhemy
favicon: "/assets/theme/favicon.png"

# -------------------------------------------------------------------------------------------------
# Build settings
# -------------------------------------------------------------------------------------------------
theme: imdhemy-jekyll-theme
exclude:
  - Gemfile
  - Gemfile.lock
  - bin/
  - _drafts

plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-archives
  - jekyll-sitemap
sass:
  quiet_deps: true # Suppress deprecation warnings from Sass

paginate: 7
paginate_path: "/blog/page:num/"
markdown: kramdown
permalink: /blog/:categories/:title:output_ext

jekyll-archives:
  enabled:
    - categories
    - tags
  layout: "archive"
  permalinks:
    tag: '/tag/:name/'
    category: '/category/:name/'

# -------------------------------------------------------------------------------------------------
# Author
# -------------------------------------------------------------------------------------------------
author:
  name: Dhemy
  description: |
    I'm a software engineer and customer data expert focused on turning raw data into meaningful, actionable insights.
    I work across the full customer data lifecycle, from clean data capture to behavior-aware models and decisions.
  avatar: /theme/images/avatar.jpeg

# -------------------------------------------------------------------------------------------------
# Navigation
# -------------------------------------------------------------------------------------------------
navigation:
  - title: "Home"
    url: "/"
  - title: "Blog"
    url: "/blog"
  - title: "About"
    url: "/about"

